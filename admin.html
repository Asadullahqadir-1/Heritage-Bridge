<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="admin.css">
  <script src="admin.js" defer></script>
</head>
<body>
  <header>
    <h1>Website Admin Panel</h1>
    <p>Manage your website content easily.</p>
  </header>

  <main>
    <section class="content-editor">
      <h2>Edit Text Content</h2>
      <label for="text-element">Select Text Element:</label>
      <select id="text-element">
        <option value="nav-about">About (Navigation)</option>
        <option value="nav-gallery">Gallery (Navigation)</option>
        <option value="nav-contact">Contact (Navigation)</option>
        <option value="section-welcome">Welcome Section</option>
        <option value="section-about">About Section</option>
        <option value="section-gallery">Gallery Section</option>
        <option value="section-contact">Contact Section</option>
      </select>

      <label for="new-text">New Text:</label>
      <textarea id="new-text" placeholder="Enter the new text here..."></textarea>

      <button type="button" id="save-text">Save Text</button>
    </section>

    <section class="image-editor">
      <h2>Edit Images</h2>
      <label for="image-element">Select Image Element:</label>
      <select id="image-element">
        <option value="header-image">Header Image</option>
        <option value="gallery-image-1">Gallery Image 1</option>
        <option value="gallery-image-2">Gallery Image 2</option>
      </select>

      <label for="new-image">Upload New Image:</label>
      <input type="file" id="new-image" accept="image/*">

      <button type="button" id="save-image">Save Image</button>
    </section>

    <section class="current-content">
      <h2>Current Content</h2>
      <pre id="content-display">Loading...</pre>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const isAuthenticated = localStorage.getItem('isAuthenticated');

      if (!isAuthenticated) {
        window.location.href = 'signin.html';
      }

      const signOutButton = document.createElement('button');
      signOutButton.textContent = 'Sign Out';
      signOutButton.style.margin = '1rem';
      signOutButton.addEventListener('click', () => {
        localStorage.removeItem('isAuthenticated');
        window.location.href = 'signin.html';
      });

      document.body.prepend(signOutButton);
    });
  </script>
</body>
</html>
